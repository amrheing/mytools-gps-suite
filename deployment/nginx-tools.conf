upstream google-gpx-converter {
    server 172.22.1.10:80;
}

upstream extract-gpx-parts {
    server 172.22.1.20:5000;
}

server {
    listen 80;
    listen 443 ssl;
    server_name tools.amrhein.info;

    # SSL Configuration (using same certs as main domain)
    ssl_certificate /etc/ssl/certs/amrhein.crt;
    ssl_certificate_key /etc/ssl/private/amrhein.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security Headers
    add_header Strict-Transport-Security "max-age=15768000;";
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies none;
    add_header Referrer-Policy strict-origin;

    # Redirect HTTP to HTTPS
    if ($scheme != "https") {
        return 301 https://$server_name$request_uri;
    }

    # Root page - serve index.html from myTools directory
    location = / {
        alias /opt/containerd/myTools/;
        try_files /index.html =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Serve static files from myTools directory
    location ~ ^/(shared|static)/ {
        root /opt/containerd/myTools;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Google GPX Converter
    location /google-gpx-converter/ {
        proxy_pass http://google-gpx-converter/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Handle large file uploads
        client_max_body_size 100M;
        proxy_request_buffering off;
    }

    # Extract GPX Parts
    location /extract-gpx-parts/ {
        proxy_pass http://extract-gpx-parts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Handle large file uploads for GPX files
        client_max_body_size 100M;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
    }

    # Health check endpoint
    location /health {
        return 200 '{"status":"ok","services":{"google-gpx-converter":"running","extract-gpx-parts":"running"}}';
        add_header Content-Type application/json;
    }

    # Access logs
    access_log /var/log/nginx/tools_amrhein_access.log;
    error_log /var/log/nginx/tools_amrhein_error.log;
}